site: https://en.wikipedia.org/wiki/Python_(programming_language)
use: beautifulsoup

headers:
  User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

scrape:
  title:
    - 'h1#firstHeading'
    - attr: text

  summary:
    - 'div.mw-parser-output p:has(b)'
    - attr: text

  sections:
    - 'h2'
    - attr: text
      all: true

  categories:
    - 'div#mw-normal-catlinks ul li a'
    - attr: text
      all: true

transform:
  summary:
    - remove_tags
    - normalize_whitespace
  title:
    - strip
    - normalize_whitespace
  sections:
    - strip

validate:
  title:
    required: true
  summary:
    required: true